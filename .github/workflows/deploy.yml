name: Test, build and publish multi-architecture images

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: books-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-migrations:
    name: Check Alembic migrations on model changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify each model change ships with a migration
        run: |
          set -euo pipefail
          # Si `backend/app/main.py` cambió en este push (diff vs main anterior)
          # debe existir al menos UN archivo nuevo en backend/alembic/versions/.
          # Esto evita repetir el bug de "agregué cover_path sin migrar".
          if git diff --name-only HEAD~1 HEAD | grep -q '^backend/app/main\.py$'; then
            NEW_MIG=$(git diff --name-only HEAD~1 HEAD | grep -E '^backend/alembic/versions/.*\.py$' || true)
            if [ -z "$NEW_MIG" ]; then
              echo "::error::backend/app/main.py cambió pero no se agregó ninguna migración en backend/alembic/versions/."
              echo "Generá una con: cd backend && alembic revision --autogenerate -m 'descripcion'"
              exit 1
            fi
            echo "✅ Migración detectada: $NEW_MIG"
          else
            echo "app/main.py sin cambios, gate omitido."
          fi

  test-backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    needs: [check-migrations]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-dev.txt
      - name: Run pytest
        run: |
          . .venv/bin/activate
          pytest -q

  test-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Backend deps
        working-directory: backend
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements-dev.txt
      - name: Frontend deps + Playwright browser
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E
        env:
          VITE_BACKEND_URL: http://127.0.0.1:8765
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          BOOKS_ADMIN_USERNAME: admin
          BOOKS_ADMIN_PASSWORD: e2e-test-password
        run: bash scripts/e2e.sh

  publish:
    name: Build and publish Docker Hub images
    runs-on: ubuntu-latest
    needs: [test-backend, test-e2e]
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: backend
            image: arturoalvarez/books-backend
          - context: frontend
            image: arturoalvarez/books-frontend
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max